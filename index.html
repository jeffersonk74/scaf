<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCAF RCA | Plus qu'un club, une famille</title>
    <meta
      name="description"
      content="Site officiel du club de football amateur SCAF RCA : actualités, équipe, partenaires et contact."
    />
    <style>
      /* Base et palette du club */
      :root {
        --club-blue: #0d3b8e;
        --club-white: #ffffff;
        --club-surface: #f4f7fc;
        --club-text: #10243d;
        --club-muted: #5f6f86;
        --club-shadow: 0 10px 30px rgba(13, 59, 142, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--club-text);
        background: var(--club-surface);
        line-height: 1.5;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      img {
        max-width: 100%;
        display: block;
      }

      .skip-link {
        position: absolute;
        left: -999px;
        top: 0;
        background: var(--club-blue);
        color: var(--club-white);
        padding: 0.75rem 1rem;
        z-index: 999;
      }

      .skip-link:focus {
        left: 0.75rem;
        top: 0.75rem;
        border-radius: 0.5rem;
      }

      .container {
        width: min(1100px, 92%);
        margin: 0 auto;
      }

      /* Header / navigation */
      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #e7edf7;
      }

      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        min-height: 72px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        font-weight: 700;
      }

      .brand-badge {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2f6fdd, #0d3b8e);
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 0.85rem;
      }

      .nav-list {
        display: flex;
        align-items: center;
        gap: 0.85rem;
        list-style: none;
        margin: 0;
        padding: 0;
        overflow-x: auto;
      }

      .nav-link {
        padding: 0.45rem 0.6rem;
        border-radius: 0.5rem;
        color: var(--club-muted);
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      .nav-link:hover,
      .nav-link:focus-visible {
        background: #e8f0ff;
        color: var(--club-blue);
        outline: none;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 999px;
        padding: 0.75rem 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      }

      .btn:hover,
      .btn:focus-visible {
        transform: translateY(-2px);
        opacity: 0.95;
        box-shadow: 0 8px 24px rgba(13, 59, 142, 0.22);
        outline: none;
      }

      .btn-primary {
        color: var(--club-white);
        background: var(--club-blue);
      }

      /* Hero */
      .hero {
        margin-top: 1rem;
      }

      .hero-panel {
        border-radius: 1.25rem;
        color: #fff;
        padding: 3.25rem 1.25rem;
        background: radial-gradient(circle at 15% 20%, #4c87e8 0%, #1f5fca 35%, #0d3b8e 100%);
        box-shadow: var(--club-shadow);
      }

      .hero h1 {
        margin-top: 0;
        margin-bottom: 0.75rem;
        font-size: clamp(1.75rem, 6vw, 3rem);
        line-height: 1.15;
      }

      .hero p {
        max-width: 60ch;
        margin-bottom: 1.3rem;
        color: #e6efff;
      }

      /* Sections */
      .section {
        padding: 2.3rem 0;
      }

      .section h2 {
        margin-top: 0;
        margin-bottom: 0.9rem;
        font-size: clamp(1.35rem, 3.5vw, 2rem);
      }

      .section-intro {
        margin: 0 0 1.25rem;
        color: var(--club-muted);
      }

      .grid {
        display: grid;
        gap: 1rem;
      }

      .card {
        background: #fff;
        border-radius: 1rem;
        padding: 1rem;
        box-shadow: var(--club-shadow);
        transition: transform 0.2s ease;
      }

      .card:hover {
        transform: translateY(-4px);
      }

      .card h3 {
        margin-top: 0;
        margin-bottom: 0.45rem;
        font-size: 1.1rem;
      }

      .card p {
        margin-top: 0;
        color: var(--club-muted);
      }

      .news-date {
        display: inline-block;
        margin-bottom: 0.6rem;
        font-size: 0.88rem;
        color: #44618e;
      }

      .link-button {
        display: inline-flex;
        margin-top: 0.4rem;
        color: var(--club-blue);
        font-weight: 600;
      }

      .partners-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.75rem;
      }

      .partner-item {
        background: #fff;
        border-radius: 0.8rem;
        min-height: 64px;
        display: grid;
        place-items: center;
        color: #36527f;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      /* Footer */
      .footer {
        padding: 2rem 0;
        background: #081c3b;
        color: #dce6fb;
      }

      .footer-grid {
        display: grid;
        gap: 1rem;
      }

      .footer a {
        color: #f3f6ff;
      }

      .footer-small {
        margin-top: 1.3rem;
        padding-top: 0.9rem;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 0.9rem;
      }

      @media (min-width: 720px) {
        .header-inner {
          gap: 1rem;
        }

        .hero-panel {
          padding: 4.2rem 2rem;
        }

        .grid-3 {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .partners-row {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .footer-grid {
          grid-template-columns: 1.2fr 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">Aller au contenu principal</a>

    <header class="header" aria-label="En-tête principal">
      <div class="container header-inner">
        <a href="#" class="brand" aria-label="Accueil du club SCAF RCA">
          <span class="brand-badge" aria-hidden="true">SCAF</span>
          <span id="club-name">SCAF RCA</span>
        </a>

        <nav aria-label="Navigation principale">
          <ul class="nav-list" id="main-nav-list"></ul>
        </nav>

        <a href="#contact" class="btn btn-primary" id="join-button"></a>
      </div>
    </header>

    <main id="main-content">
      <section class="hero container" aria-labelledby="hero-title">
        <div class="hero-panel">
          <h1 id="hero-title"></h1>
          <p id="hero-subtitle"></p>
          <a href="#actualites" class="btn btn-primary" id="hero-cta"></a>
        </div>
      </section>

      <section class="section container" id="actualites" aria-labelledby="news-title">
        <h2 id="news-title">Actualités</h2>
        <p class="section-intro" id="news-intro"></p>
        <div class="grid grid-3" id="news-grid" aria-live="polite"></div>
      </section>

      <section class="section container" id="equipe" aria-labelledby="team-title">
        <h2 id="team-title">Talents & Équipe</h2>
        <p class="section-intro" id="team-intro"></p>
        <div class="grid grid-3" id="team-grid"></div>
      </section>

      <section class="section container" id="partenaires" aria-labelledby="partners-title">
        <h2 id="partners-title">Partenaires</h2>
        <p class="section-intro" id="partners-intro"></p>
        <div class="partners-row" id="partners-row"></div>
      </section>
    </main>

    <footer class="footer" id="contact">
      <div class="container footer-grid">
        <div>
          <strong id="footer-club-name"></strong>
          <p id="footer-note"></p>
        </div>
        <div>
          <strong>Liens rapides</strong>
          <ul id="quick-links"></ul>
        </div>
        <div>
          <strong>Réseaux sociaux</strong>
          <ul id="social-links"></ul>
        </div>
      </div>
      <div class="container footer-small" id="copyright"></div>
    </footer>

    <script>
      // Contenu centralisé pour faciliter une future alimentation dynamique (ex: MySQL/API)
      const siteContent = {
        clubName: 'SCAF RCA',
        nav: ['Accueil', 'Équipe', 'Actualités', 'Partenaires', 'Contact'],
        joinLabel: 'Rejoindre le club',
        hero: {
          title: 'Plus qu\'un club, une famille',
          subtitle:
            'Le SCAF RCA rassemble passion, formation et solidarité pour faire grandir chaque joueuse, chaque joueur et toute la communauté des supporters.',
          cta: 'Découvrir nos actualités'
        },
        newsIntro: 'Les dernières nouvelles du club seront alimentées dynamiquement via notre futur back-office.',
        news: [
          {
            title: 'Victoire à domicile 3-1',
            summary: 'Une performance collective solide qui place le SCAF RCA dans le haut du classement.',
            date: '20 mai 2026',
            isoDate: '2026-05-20',
            link: '#'
          },
          {
            title: 'Portes ouvertes école de foot',
            summary: 'Les inscriptions U8 à U13 sont lancées. Venez découvrir nos séances encadrées.',
            date: '15 mai 2026',
            isoDate: '2026-05-15',
            link: '#'
          },
          {
            title: 'Nouveau partenaire local',
            summary: 'Merci à notre nouveau sponsor pour son soutien au développement du club.',
            date: '10 mai 2026',
            isoDate: '2026-05-10',
            link: '#'
          }
        ],
        teamIntro: 'Une équipe unie, des valeurs fortes et un accompagnement humain au cœur de notre projet sportif.',
        talents: [
          {
            title: 'Formation locale',
            description: 'Un parcours progressif pour accompagner chaque jeune talent du quartier.'
          },
          {
            title: 'Esprit collectif',
            description: 'La cohésion et le respect guident chaque entraînement et chaque match.'
          },
          {
            title: 'Ambition durable',
            description: 'Développer la performance tout en préservant la santé et l\'équilibre des joueurs.'
          }
        ],
        partnersIntro: 'Ils accompagnent la vie du club toute la saison.',
        partners: ['RCA SPORT', 'VILLE ACTIVE', 'NOVA ÉNERGIE', 'ATELIER 11'],
        footerNote: 'Club de football amateur ouvert à toutes et à tous.',
        quickLinks: ['Mentions légales', 'Politique de confidentialité', 'Contact'],
        socials: ['Instagram', 'Facebook', 'YouTube']
      };

      const navIdMap = {
        Accueil: '#',
        Équipe: '#equipe',
        Actualités: '#actualites',
        Partenaires: '#partenaires',
        Contact: '#contact'
      };

      document.getElementById('club-name').textContent = siteContent.clubName;
      document.getElementById('footer-club-name').textContent = siteContent.clubName;
      document.getElementById('join-button').textContent = siteContent.joinLabel;

      document.getElementById('hero-title').textContent = siteContent.hero.title;
      document.getElementById('hero-subtitle').textContent = siteContent.hero.subtitle;
      document.getElementById('hero-cta').textContent = siteContent.hero.cta;

      document.getElementById('news-intro').textContent = siteContent.newsIntro;
      document.getElementById('team-intro').textContent = siteContent.teamIntro;
      document.getElementById('partners-intro').textContent = siteContent.partnersIntro;

      document.getElementById('main-nav-list').innerHTML = siteContent.nav
        .map((label) => `<li><a class="nav-link" href="${navIdMap[label] ?? '#'}">${label}</a></li>`)
        .join('');

      document.getElementById('news-grid').innerHTML = siteContent.news
        .map(
          (article) => `
          <article class="card" aria-label="Actualité: ${article.title}">
            <time class="news-date" datetime="${article.isoDate}">${article.date}</time>
            <h3>${article.title}</h3>
            <p>${article.summary}</p>
            <a class="link-button" href="${article.link}" aria-label="Lire la suite: ${article.title}">Lire la suite</a>
          </article>
        `
        )
        .join('');

      document.getElementById('team-grid').innerHTML = siteContent.talents
        .map(
          (item) => `
          <article class="card">
            <h3>${item.title}</h3>
            <p>${item.description}</p>
          </article>
        `
        )
        .join('');

      document.getElementById('partners-row').innerHTML = siteContent.partners
        .map((partner) => `<div class="partner-item" role="img" aria-label="Partenaire ${partner}">${partner}</div>`)
        .join('');

      document.getElementById('quick-links').innerHTML = siteContent.quickLinks
        .map((item) => `<li><a href="#">${item}</a></li>`)
        .join('');

      document.getElementById('social-links').innerHTML = siteContent.socials
        .map((item) => `<li><a href="#">${item}</a></li>`)
        .join('');

      document.getElementById('footer-note').textContent = siteContent.footerNote;
      document.getElementById('copyright').textContent = `© ${new Date().getFullYear()} ${siteContent.clubName}. Tous droits réservés.`;
    </script>
  </body>
</html>
